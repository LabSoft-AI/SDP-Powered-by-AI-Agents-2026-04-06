<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="619px" preserveAspectRatio="none" style="width:563px;height:619px;background:#FFFFFF;" version="1.1" viewBox="0 0 563 619" width="563px" zoomAndPan="magnify"><title>Red-Green-Refactor Cycle</title><defs/><g><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="177.5753" x="185.786" y="24.9659">Red-Green-Refactor Cycle</text><g id="red"><rect fill="#FFCCCC" height="58.1358" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="139.6155" x="173.5" y="131.5679"/><line style="stroke:#181818;stroke-width:0.5;" x1="173.5" x2="313.1155" y1="179.7038" y2="179.7038"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="30.3519" x="183.5" y="151.5339">&#128308; RED</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="119.6155" x="183.5" y="170.6018">Write a failing test</text></g><g id="green"><rect fill="#CCFFCC" height="77.2038" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="119.0216" x="7" y="275.0679"/><line style="stroke:#181818;stroke-width:0.5;" x1="7" x2="126.0216" y1="342.2717" y2="342.2717"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="60.5917" x="17" y="295.0339">&#9989; GREEN</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="81.7457" x="17" y="314.1018">Make it pass</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="99.0216" x="17" y="333.1697">(simplest code)</text></g><g id="refactor"><rect fill="#CCCCFF" height="77.2038" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="138.9436" x="174" y="433.0679"/><line style="stroke:#181818;stroke-width:0.5;" x1="174" x2="312.9436" y1="500.2717" y2="500.2717"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="85.1685" x="184" y="453.0339">&#9851;&#65039; REFACTOR</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="103.4316" x="184" y="472.1018">Improve design</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="118.9436" x="184" y="491.1697">(tests protect you)</text></g><ellipse cx="243.5" cy="56.0679" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><ellipse cx="243.5" cy="602.0679" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="243.5" cy="602.0679" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><g id="elem_GMN2"><path d="M349,127.0679 L349,156.5679 L313.64,160.5679 L349,164.5679 L349,194.2717 A0,0 0 0 0 349,194.2717 L518.1194,194.2717 A0,0 0 0 0 518.1194,194.2717 L518.1194,137.0679 L508.1194,127.0679 L349,127.0679 A0,0 0 0 0 349,127.0679 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M508.1194,127.0679 L508.1194,137.0679 L518.1194,137.0679 L508.1194,127.0679 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="91.8676" x="355" y="147.0339">Test must fail.</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="148.1194" x="355" y="166.1018">If it passes, something</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="145.7814" x="355" y="185.1697">is wrong with the test.</text></g><g id="elem_GMN5"><path d="M161.5,289.5679 L161.5,309.5679 L126.3,313.5679 L161.5,317.5679 L161.5,337.7038 A0,0 0 0 0 161.5,337.7038 L349.6313,337.7038 A0,0 0 0 0 349.6313,337.7038 L349.6313,299.5679 L339.6313,289.5679 L161.5,289.5679 A0,0 0 0 0 161.5,289.5679 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M339.6313,289.5679 L339.6313,299.5679 L349.6313,299.5679 L339.6313,289.5679 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="167.1313" x="167.5" y="309.5339">Write the minimum code.</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="109.7316" x="167.5" y="328.6018">Fake It if unsure.</text></g><g id="elem_GMN8"><path d="M348.5,438.0679 L348.5,467.5679 L313.3,471.5679 L348.5,475.5679 L348.5,505.2717 A0,0 0 0 0 348.5,505.2717 L556.1473,505.2717 A0,0 0 0 0 556.1473,505.2717 L556.1473,448.0679 L546.1473,438.0679 L348.5,438.0679 A0,0 0 0 0 348.5,438.0679 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M546.1473,438.0679 L546.1473,448.0679 L556.1473,448.0679 L546.1473,438.0679 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="142.0154" x="354.5" y="458.0339">Eliminate duplication.</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="107.2956" x="354.5" y="477.1018">Improve names.</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="186.6473" x="354.5" y="496.1697">Run tests after each change.</text></g><!--link *start* to red--><g id="link_*start*_red"><path d="M243.5,66.1679 C243.5,80.6679 243.5,103.6179 243.5,125.4679 " fill="none" id="*start*-to-red" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="243.5,131.4679,247.5,122.4679,243.5,126.4679,239.5,122.4679,243.5,131.4679" style="stroke:#181818;stroke-width:1;"/></g><!--link red to green--><g id="link_red_green"><path d="M210.62,189.6179 C182.43,213.6679 146.1349,244.6341 115.1149,271.0941 " fill="none" id="red-to-green" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="110.55,274.9879,119.9932,272.1904,114.3541,271.7431,114.8014,266.1039,110.55,274.9879" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="71.5117" x="167.5" y="240.0339">implement</text></g><!--link green to refactor--><g id="link_green_refactor"><path d="M109.35,352.3279 C137.07,376.7679 168.5286,404.4909 196.2386,428.9109 " fill="none" id="green-to-refactor" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="200.74,432.8779,196.6325,423.9265,196.9888,429.5721,191.3432,429.9284,200.74,432.8779" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="55.6358" x="167.5" y="398.0339">clean up</text></g><!--link refactor to red--><g id="link_refactor_red"><path d="M300.38,432.8179 C326.03,412.3079 353.63,384.5079 367.5,352.0679 C380.95,320.5979 381.29,306.3879 367.5,275.0679 C351.68,239.1479 323.1589,213.1021 294.9889,193.1821 " fill="none" id="refactor-to-red" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="290.09,189.7179,295.1289,198.1802,294.1724,192.6047,299.7478,191.6483,290.09,189.7179" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="57.3578" x="378.5" y="319.0339">next test</text></g><!--link refactor to *end*--><g id="link_refactor_*end*"><path d="M243.5,510.0779 C243.5,537.7879 243.5,567.5679 243.5,584.8379 " fill="none" id="refactor-to-*end*" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="243.5,590.8379,247.5,581.8379,243.5,585.8379,239.5,581.8379,243.5,590.8379" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="33.6279" x="244.5" y="556.0339">done</text></g><!--SRC=[TL6zYXH14CxxAOhRn1FtG33QG91rvzX0XV70m3LeUsfcYfsk7hghNS_SsCH447m90y6tyGNq4QoUdLrKS89cgAhlfxvAU-BHHk