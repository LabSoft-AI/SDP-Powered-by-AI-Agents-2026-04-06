name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
    paths: ['docs/**', 'modules/**', 'survey/**', 'exam/**', 'COURSE-TRACKER.md']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install sphinx==8.1.3 myst-parser==4.0.0 sphinx-copybutton==0.5.2 sphinx-wagtail-theme==6.5.0 sphinx-new-tab-link==0.6.0

      - name: Build Sphinx docs
        run: sphinx-build -b html docs docs/_build/html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
